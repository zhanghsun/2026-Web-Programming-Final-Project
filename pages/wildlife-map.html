<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<base href="../">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中央大學 常見物種地圖 — NCU Species Map</title>

<style>
/* =====================================================
   Map Page — True fullscreen immersive ecology map
   ===================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --green-primary:  #8fdf8f;
    --gold:           #ffd700;
    --panel-width:    420px;
    --panel-ease:     cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── Base: true fullscreen, zero overflow ── */
html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Segoe UI', Arial, sans-serif;
    color: #e8f5e9;
    user-select: none;
    -webkit-user-select: none;
}

/* Cinematic radial bg */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 90% 85% at 50% 48%,
        rgba(4, 26, 10, 0.88) 0%,
        rgba(0, 0, 0, 1) 100%);
    z-index: 0;
    pointer-events: none;
}

/* ── Back button ── */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 6000;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px 8px 12px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(143, 223, 143, 0.25);
    border-radius: 100px;
    color: rgba(232, 245, 233, 0.88);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.28s, border-color 0.28s, transform 0.22s, box-shadow 0.28s;
}
.back-btn:hover {
    background: rgba(143, 223, 143, 0.14);
    border-color: rgba(143, 223, 143, 0.6);
    transform: translateX(-3px);
    box-shadow: 0 0 22px rgba(143, 223, 143, 0.08);
}
.back-btn svg { flex-shrink: 0; }

/* ── Map stage: fills entire viewport ── */
.map-stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: padding-right 0.5s var(--panel-ease);
}
.map-stage.panel-open {
    padding-right: var(--panel-width);
}

/* ── Map container: sized by JS to exactly match rendered image ── */
.map-container {
    position: relative;
    display: block;
    line-height: 0;
    animation: mapEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    /* JS sets width/height */
}
@keyframes mapEntrance {
    from { opacity: 0; transform: scale(0.84); filter: brightness(0.25); }
    to   { opacity: 1; transform: scale(1);    filter: brightness(1); }
}

/* Ambient glow behind the map */
.map-container::before {
    content: '';
    position: absolute;
    inset: -50px;
    background: radial-gradient(ellipse at 50% 50%,
        rgba(40, 140, 40, 0.12) 0%,
        transparent 65%);
    pointer-events: none;
    z-index: -1;
}

/* ── Map image: fills the JS-sized container exactly ── */
.map-container img.main-map {
    display: block;
    width: 100%;
    height: 100%;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
    /* No border-radius: edge-to-edge fullscreen feel */
}

/* ── Hotspots ── */
.spot {
    position: absolute;
    width: 52px;
    height: 52px;
    cursor: pointer;
    transform: translate(-50%, -50%);
    z-index: 5;
    transition: transform 0.22s ease;
}

/* Name tooltip on hover */
.spot::after {
    content: attr(aria-label);
    position: absolute;
    bottom: calc(100% + 9px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(0, 0, 0, 0.86);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #e8f5e9;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 4px 11px;
    border-radius: 6px;
    border: 1px solid rgba(143, 223, 143, 0.22);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s ease, transform 0.16s ease;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
}
.spot:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.spot img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2.5px solid rgba(143, 223, 143, 0.55);
    object-fit: cover;
    box-shadow: 0 2px 14px rgba(0, 0, 0, 0.6);
    transition: border-color 0.22s ease, box-shadow 0.22s ease;
    animation: spotPulse 2s ease-out 1s 1;
}
@keyframes spotPulse {
    0%   { box-shadow: 0 0 0 0   rgba(143,223,143,0.7),  0 2px 14px rgba(0,0,0,0.6); }
    65%  { box-shadow: 0 0 0 14px rgba(143,223,143,0),   0 2px 14px rgba(0,0,0,0.6); }
    100% { box-shadow: 0 0 0 0   rgba(143,223,143,0),    0 2px 14px rgba(0,0,0,0.6); }
}

.spot:hover {
    transform: translate(-50%, -50%) scale(1.4);
    z-index: 10;
}
.spot:hover img {
    border-color: var(--green-primary);
    box-shadow: 0 6px 24px rgba(0,0,0,0.65), 0 0 0 3px rgba(143,223,143,0.3);
}
.spot.active {
    transform: translate(-50%, -50%) scale(1.22);
    z-index: 8;
}
.spot.active img {
    border-color: var(--gold);
    box-shadow: 0 6px 24px rgba(0,0,0,0.65), 0 0 0 3px rgba(255,215,0,0.4), 0 0 18px rgba(255,215,0,0.18);
}

/* ── Spot positions ── */
.spot--squirrel  { top: 28.6%; left: 60.3%; }
.spot--magpie    { top: 54.4%; left: 52.9%; }
.spot--dragonfly { top: 16.3%; left: 45.4%; }
.spot--frog      { top: 25.7%; left: 42.3%; }
.spot--lizard    { top: 54.4%; left: 23%;   }
.spot--cherry    { top: 34.7%; left: 24.3%; }
.spot--cedar     { top: 58.7%; left: 39.2%; }
.spot--paperbark { top: 68.7%; left: 57.1%; }
.spot--juniper   { top: 34.7%; left: 50.3%; }
.spot--acacia    { top: 58.8%; left: 70.2%; }

/* ── Side panel - Modern Species Detail Drawer ── */
.side-panel {
    position: fixed;
    top: 0;
    right: -520px;
    width: 480px;
    height: 100vh;
    background: #FAFAF7;
    box-shadow: -8px 0 40px rgba(0, 0, 0, 0.15);
    transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 5000;
    overflow: hidden;
}
.side-panel.show { right: 0; }

/* Close Button */
.sp-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(45, 106, 79, 0.1);
    color: #2d6a4f;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}
.sp-close:hover {
    background: #2d6a4f;
    color: white;
    transform: rotate(90deg);
    box-shadow: 0 4px 20px rgba(45, 106, 79, 0.3);
}
.sp-close svg { width: 20px; height: 20px; }

/* Scrollable Content */
.sp-scroll {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
}
.sp-scroll::-webkit-scrollbar { width: 6px; }
.sp-scroll::-webkit-scrollbar-track { background: transparent; }
.sp-scroll::-webkit-scrollbar-thumb { background: rgba(45, 106, 79, 0.2); border-radius: 3px; }
.sp-scroll::-webkit-scrollbar-thumb:hover { background: rgba(45, 106, 79, 0.4); }

/* Hero Image */
.sp-hero {
    position: relative;
    width: 100%;
    height: 280px;
    overflow: hidden;
}
.sp-hero__img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
}
.side-panel.show .sp-hero__img { transform: scale(1.05); }
.sp-hero__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 0%, rgba(250, 250, 247, 0.3) 60%, rgba(250, 250, 247, 0.95) 100%);
}
.sp-hero__badge {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #2d6a4f;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid rgba(45, 106, 79, 0.15);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
}

/* Content Container */
.sp-content { padding: 0 28px 32px; }

/* Title Section */
.sp-title-section {
    margin-top: -40px;
    position: relative;
    z-index: 2;
}
.sp-title-flex {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: space-between;
}
.sp-title-text { flex: 1; }
.sp-eyebrow {
    display: inline-block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #2d6a4f;
    font-weight: 700;
    margin-bottom: 8px;
    padding: 4px 12px;
    background: rgba(45, 106, 79, 0.08);
    border-radius: 12px;
}
.sp-title {
    font-size: clamp(1.8rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #1a3a2e;
    margin: 0 0 8px 0;
    line-height: 1.2;
}
.sp-subtitle {
    font-size: 0.9rem;
    color: #6b7280;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    line-height: 1.6;
}
.sp-scientific {
    font-style: italic;
    color: #8B5E3C;
    font-weight: 500;
}
.sp-divider { color: #d1d5db; }
.sp-avatar {
    width: 80px;
    height: 80px;
    border-radius: 16px;
    object-fit: cover;
    border: 3px solid white;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
}

/* Quick Stats Grid */
.sp-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 28px 0;
}
.sp-stat-item {
    padding: 16px 12px;
    background: white;
    border-radius: 16px;
    border: 1px solid rgba(45, 106, 79, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    transition: all 0.3s ease;
}
.sp-stat-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(45, 106, 79, 0.12);
    border-color: rgba(45, 106, 79, 0.25);
}
.sp-stat-icon {
    font-size: 1.5rem;
    line-height: 1;
}
.sp-stat-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.sp-stat-label {
    font-size: 0.7rem;
    color: #9ca3af;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.sp-stat-value {
    font-size: 0.85rem;
    color: #1a3a2e;
    font-weight: 600;
}

/* Section Block */
.sp-section { margin-bottom: 28px; }
.sp-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid rgba(45, 106, 79, 0.1);
}
.sp-section-icon {
    font-size: 1.3rem;
    line-height: 1;
}
.sp-section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a3a2e;
    margin: 0;
    flex: 1;
}
.sp-section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #9ca3af;
    font-weight: 600;
}

/* Story Text */
.sp-story-text {
    font-size: 0.95rem;
    line-height: 1.8;
    color: #4b5563;
    margin: 0;
    text-align: justify;
}

/* ID Clues List */
.sp-id-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.sp-id-list li {
    padding: 12px 16px;
    background: rgba(45, 106, 79, 0.04);
    border-left: 3px solid #52b788;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #374151;
    line-height: 1.6;
    transition: all 0.2s ease;
}
.sp-id-list li:hover {
    background: rgba(45, 106, 79, 0.08);
    transform: translateX(4px);
}
.sp-id-list li::before {
    content: '✓';
    color: #52b788;
    font-weight: bold;
    margin-right: 10px;
}

/* Info Box */
.sp-info-box {
    padding: 16px;
    background: white;
    border-radius: 12px;
    border: 1px solid rgba(45, 106, 79, 0.1);
}
.sp-info-box p {
    font-size: 0.9rem;
    line-height: 1.7;
    color: #4b5563;
    margin: 0;
}

/* Distribution / Threats / Conservation Content */
.sp-dist-content ul,
.sp-threats-content ul,
.sp-conservation-content ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.sp-dist-content li,
.sp-threats-content li,
.sp-conservation-content li {
    padding: 14px 16px;
    background: white;
    border-radius: 12px;
    border: 1px solid rgba(45, 106, 79, 0.08);
    font-size: 0.9rem;
    line-height: 1.7;
    color: #4b5563;
    transition: all 0.2s ease;
}
.sp-dist-content li:hover,
.sp-threats-content li:hover,
.sp-conservation-content li:hover {
    border-color: rgba(45, 106, 79, 0.2);
    box-shadow: 0 2px 8px rgba(45, 106, 79, 0.08);
}
.sp-dist-content strong,
.sp-threats-content strong,
.sp-conservation-content strong {
    color: #2d6a4f;
    font-weight: 600;
}

/* Action Buttons */
.sp-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid rgba(45, 106, 79, 0.1);
}
.sp-btn {
    flex: 1;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    text-decoration: none;
}
.sp-btn--primary {
    background: #2d6a4f;
    color: white;
    box-shadow: 0 2px 12px rgba(45, 106, 79, 0.2);
}
.sp-btn--primary:hover {
    background: #1e4935;
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(45, 106, 79, 0.3);
}
.sp-btn--ghost {
    background: transparent;
    color: #2d6a4f;
    border: 1.5px solid rgba(45, 106, 79, 0.3);
}
.sp-btn--ghost:hover {
    background: rgba(45, 106, 79, 0.05);
    border-color: #2d6a4f;
}

/* ── Responsive ── */
@media (max-width: 768px) {
    .side-panel {
        width: 100%;
        right: -100%;
    }
    .sp-hero { height: 240px; }
    .sp-content { padding: 0 20px 24px; }
    .sp-stats {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    .sp-stat-item {
        flex-direction: row;
        justify-content: flex-start;
        text-align: left;
    }
    .sp-avatar {
        width: 70px;
        height: 70px;
    }
    .sp-actions { flex-direction: column; }
    .map-stage.panel-open { padding-right: 0; }
    .spot { width: 42px; height: 42px; }
    .spot::after { display: none; }
}
@media (max-width: 480px) {
    .sp-hero { height: 200px; }
    .sp-title-flex {
        flex-direction: column-reverse;
        align-items: center;
        text-align: center;
    }
    .sp-avatar { margin-bottom: 12px; }
    .sp-subtitle { justify-content: center; }
    .spot { width: 34px; height: 34px; }
    .back-btn span { display: none; }
    .back-btn { padding: 9px 11px; border-radius: 50%; gap: 0; }
}
</style>
</head>

<body>

<!-- Floating back button -->
<a class="back-btn" href="index.html" title="返回首頁">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.5 2.5L4.5 7.5l5 5" stroke="#8fdf8f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>返回首頁</span>
</a>

<!-- Fullscreen map stage -->
<div class="map-stage" id="mapStage">
    <div class="map-container" id="mapContainer">
        <img class="main-map" id="mainMap" src="assets/images/ncu_ecology_map.png" alt="NCU Species Map">

        <!-- Animals -->
        <div class="spot spot--squirrel"  data-species="squirrel"  aria-label="赤腹松鼠"    role="button" tabindex="0"><img src="assets/images/赤腹松鼠.jpg" alt="赤腹松鼠"></div>
        <div class="spot spot--magpie"    data-species="magpie"    aria-label="台灣藍鵲"    role="button" tabindex="0"><img src="assets/images/台灣藍鵲.jpg" alt="台灣藍鵲"></div>
        <div class="spot spot--dragonfly" data-species="dragonfly" aria-label="霜白蜻蜓"    role="button" tabindex="0"><img src="assets/images/霜白蜻蜓.jpg" alt="霜白蜻蜓"></div>
        <div class="spot spot--frog"      data-species="frog"      aria-label="澤蛙"        role="button" tabindex="0"><img src="assets/images/澤蛙.jpg" alt="澤蛙"></div>
        <div class="spot spot--lizard"    data-species="lizard"    aria-label="斯文豪氏攀蜥" role="button" tabindex="0"><img src="assets/images/斯文豪氏攀蜥.jpg" alt="斯文豪氏攀蜥"></div>

        <!-- Plants -->
        <div class="spot spot--cherry"    data-species="cherry"    aria-label="櫻花"        role="button" tabindex="0"><img src="assets/images/山櫻花.jpg"  alt="櫻花"></div>
        <div class="spot spot--cedar"     data-species="cedar"     aria-label="台灣肖楠"    role="button" tabindex="0"><img src="assets/images/台灣肖楠.jpg"  alt="台灣肖楠"></div>
        <div class="spot spot--paperbark" data-species="paperbark" aria-label="白千層"      role="button" tabindex="0"><img src="assets/images/白千層.jpg"  alt="白千層"></div>
        <div class="spot spot--juniper"   data-species="juniper"   aria-label="龍柏"        role="button" tabindex="0"><img src="assets/images/龍柏.jpg"  alt="龍柏"></div>
        <div class="spot spot--acacia"    data-species="acacia"    aria-label="相思樹"      role="button" tabindex="0"><img src="assets/images/相思樹.jpg"  alt="相思樹"></div>
    </div>
</div>

<!-- Side panel -->
<div id="sidePanel" class="side-panel">
    <button class="sp-close" id="closePanelBtn" aria-label="關閉側邊欄">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
    </button>
    
    <div class="sp-scroll">
        <!-- Hero Image -->
        <div class="sp-hero">
            <img id="panelHeroImage" class="sp-hero__img" src="" alt="">
            <div class="sp-hero__overlay"></div>
            <div class="sp-hero__badge" id="panelCategory">動物</div>
        </div>

        <div class="sp-content">
            <!-- Title Section -->
            <div class="sp-title-section">
                <div class="sp-title-flex">
                    <div class="sp-title-text">
                        <span class="sp-eyebrow" id="panelCharacterTitle">物種稱號</span>
                        <h2 class="sp-title" id="panelTitle">中文名</h2>
                        <p class="sp-subtitle">
                            <span id="panelEnglishName">English Name</span>
                            <span class="sp-divider">·</span>
                            <span id="panelScientific" class="sp-scientific">Scientific name</span>
                        </p>
                    </div>
                    <img id="panelAvatar" class="sp-avatar" src="" alt="">
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="sp-stats" id="panelStats">
                <div class="sp-stat-item">
                    <span class="sp-stat-icon">⭐</span>
                    <div class="sp-stat-info">
                        <span class="sp-stat-label">常見度</span>
                        <span class="sp-stat-value" id="panelCommonness">—</span>
                    </div>
                </div>
                <div class="sp-stat-item">
                    <span class="sp-stat-icon">🕒</span>
                    <div class="sp-stat-info">
                        <span class="sp-stat-label">活動時間</span>
                        <span class="sp-stat-value" id="panelActivityTime">—</span>
                    </div>
                </div>
                <div class="sp-stat-item">
                    <span class="sp-stat-icon">📍</span>
                    <div class="sp-stat-info">
                        <span class="sp-stat-label">熱點位置</span>
                        <span class="sp-stat-value" id="panelHotspot">—</span>
                    </div>
                </div>
            </div>

            <!-- Story Section -->
            <section class="sp-section" id="panelStorySection">
                <div class="sp-section-header">
                    <span class="sp-section-icon">📖</span>
                    <h3 class="sp-section-title">物種故事</h3>
                    <span class="sp-section-label">Story</span>
                </div>
                <p class="sp-story-text" id="panelStory"></p>
            </section>

            <!-- ID Clues -->
            <section class="sp-section" id="panelIdSection">
                <div class="sp-section-header">
                    <span class="sp-section-icon">🔍</span>
                    <h3 class="sp-section-title">辨識線索</h3>
                    <span class="sp-section-label">Identification</span>
                </div>
                <ul class="sp-id-list" id="panelIdClues"></ul>
            </section>

            <!-- Classification -->
            <section class="sp-section">
                <div class="sp-section-header">
                    <span class="sp-section-icon">🧬</span>
                    <h3 class="sp-section-title">分類資訊</h3>
                    <span class="sp-section-label">Classification</span>
                </div>
                <div class="sp-info-box">
                    <p id="panelClass"></p>
                </div>
            </section>

            <!-- Distribution -->
            <section class="sp-section">
                <div class="sp-section-header">
                    <span class="sp-section-icon">🌍</span>
                    <h3 class="sp-section-title">分布區域</h3>
                    <span class="sp-section-label">Distribution</span>
                </div>
                <div class="sp-dist-content" id="panelDist"></div>
            </section>

            <!-- Threats -->
            <section class="sp-section">
                <div class="sp-section-header">
                    <span class="sp-section-icon">⚠️</span>
                    <h3 class="sp-section-title">威脅因素</h3>
                    <span class="sp-section-label">Threats</span>
                </div>
                <div class="sp-threats-content" id="panelThreats"></div>
            </section>

            <!-- Conservation -->
            <section class="sp-section">
                <div class="sp-section-header">
                    <span class="sp-section-icon">🛡️</span>
                    <h3 class="sp-section-title">保育行動</h3>
                    <span class="sp-section-label">Conservation</span>
                </div>
                <div class="sp-conservation-content" id="panelConservation"></div>
            </section>

            <!-- Action Buttons -->
            <div class="sp-actions">
                <a class="sp-btn sp-btn--primary" id="viewFullGuideBtn" href="pages/animals.html">
                    <span>查看完整圖鑑</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8h10M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <button class="sp-btn sp-btn--ghost" id="closePanelBtn2">關閉</button>
            </div>
        </div>
    </div>
</div>

<script src="js/species-data.js"></script>
<script>
(function () {
    'use strict';

    var panel    = document.getElementById('sidePanel');
    var mapStage = document.getElementById('mapStage');
    var container = document.getElementById('mapContainer');
    var mapImg   = document.getElementById('mainMap');
    var catTag   = document.getElementById('panelCategoryTag');

    /* ── Fit map to viewport ──────────────────────────────
       Sizes .map-container to the maximum dimensions that
       preserve the image aspect ratio within the available
       stage area (100vw x 100vh, minus panel if open).
       This keeps all hotspot % positions pixel-accurate.
    ──────────────────────────────────────────────────── */
    function fitMap() {
        var nw = mapImg.naturalWidth;
        var nh = mapImg.naturalHeight;
        if (!nw || !nh) return;

        var availW = mapStage.offsetWidth  || window.innerWidth;
        var availH = mapStage.offsetHeight || window.innerHeight;
        var ratio  = nw / nh;

        var w, h;
        if (availW / availH >= ratio) {
            h = availH;
            w = h * ratio;
        } else {
            w = availW;
            h = w / ratio;
        }

        container.style.width  = Math.round(w) + 'px';
        container.style.height = Math.round(h) + 'px';
    }

    if (mapImg.complete && mapImg.naturalWidth) {
        fitMap();
    } else {
        mapImg.addEventListener('load', fitMap);
    }
    window.addEventListener('resize', fitMap);

    /* ── Panel open / close ── */
    function openPanel() {
        panel.classList.add('show');
        if (window.innerWidth > 768) {
            mapStage.classList.add('panel-open');
            // Wait for CSS transition then refit
            setTimeout(fitMap, 520);
        }
    }
    function closePanel() {
        panel.classList.remove('show');
        mapStage.classList.remove('panel-open');
        setTimeout(fitMap, 520);
    }
    document.getElementById('closePanelBtn').addEventListener('click', closePanel);
    var closePanelBtn2 = document.getElementById('closePanelBtn2');
    if (closePanelBtn2) closePanelBtn2.addEventListener('click', closePanel);

    /* ── Field helper ── */
    function set(id, value, prop) {
        var el = document.getElementById(id);
        if (el && value !== undefined) el[prop] = value;
    }

    /* ── Generate star rating ── */
    function getCommonnessStars(level) {
        if (!level) return '—';
        var filled = '★', empty = '☆', stars = '';
        for (var i = 1; i <= 5; i++) {
            stars += i <= level ? filled : empty;
        }
        return stars;
    }

    /* ── Display species info ── */
    var ANIMALS = ['squirrel','magpie','dragonfly','frog','lizard'];
    function displayInfo(key) {
        var data = (typeof speciesData !== 'undefined') ? speciesData[key] : null;
        if (!data) return;
        
        // Basic info
        set('panelTitle', data.name, 'innerText');
        set('panelEnglishName', data.englishName || data.name, 'innerText');
        set('panelScientific', data.scientific, 'innerText');
        set('panelCharacterTitle', data.characterTitle || '校園物種', 'innerText');
        
        // Category badge
        var categoryText = data.category === 'animal' ? '動物' : '植物';
        set('panelCategory', categoryText, 'innerText');
        
        // Hero image
        var heroImg = document.getElementById('panelHeroImage');
        if (heroImg) {
            heroImg.src = data.photos && data.photos[0] ? data.photos[0] : data.avatar;
            heroImg.alt = data.name;
        }
        
        // Avatar
        var avatar = document.getElementById('panelAvatar');
        if (avatar) {
            avatar.src = data.avatar;
            avatar.alt = data.name;
        }
        
        // Quick stats (animals only)
        var statsEl = document.getElementById('panelStats');
        if (data.category === 'animal') {
            set('panelCommonness', getCommonnessStars(data.commonness), 'innerHTML');
            set('panelActivityTime', data.activityTime || '未知', 'innerText');
            set('panelHotspot', data.hotspot || '校園各處', 'innerText');
            if (statsEl) statsEl.style.display = 'grid';
        } else {
            if (statsEl) statsEl.style.display = 'none';
        }
        
        // Story (animals only)
        var storySection = document.getElementById('panelStorySection');
        if (data.story && data.category === 'animal') {
            set('panelStory', data.story, 'innerText');
            if (storySection) storySection.style.display = 'block';
        } else {
            if (storySection) storySection.style.display = 'none';
        }
        
        // ID Clues (animals only)
        var idSection = document.getElementById('panelIdSection');
        var idList = document.getElementById('panelIdClues');
        if (data.idClues && data.category === 'animal') {
            if (idList) {
                idList.innerHTML = '';
                data.idClues.forEach(function(clue) {
                    var li = document.createElement('li');
                    li.textContent = clue;
                    idList.appendChild(li);
                });
            }
            if (idSection) idSection.style.display = 'block';
        } else {
            if (idSection) idSection.style.display = 'none';
        }
        
        // Classification, Distribution, Threats, Conservation
        set('panelClass', data.classification, 'innerText');
        set('panelDist', data.dist, 'innerHTML');
        set('panelThreats', data.threats, 'innerHTML');
        set('panelConservation', data.conservation, 'innerHTML');
        
        // 更新按鈕連結
        var guideBtn = document.getElementById('viewFullGuideBtn');
        if (guideBtn) {
            guideBtn.href = data.category === 'animal' ? 'pages/animals.html' : 'pages/plants.html';
        }
        
        openPanel();
    }

    /* ── Active spot ── */
    function clearActive() {
        var a = document.querySelector('.spot.active');
        if (a) a.classList.remove('active');
    }
    function activate(key) {
        clearActive();
        var s = document.querySelector('.spot[data-species="' + key + '"]');
        if (s) s.classList.add('active');
    }

    /* ── Spot events ── */
    function handleActivate() {
        var key = this.getAttribute('data-species');
        if (!key) return;
        activate(key);
        displayInfo(key);
    }
    document.querySelectorAll('.spot').forEach(function (spot) {
        spot.addEventListener('click', handleActivate);
        spot.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleActivate.call(this); }
        });
    });

    /* ── Keyboard ── */
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closePanel();
    });

})();
</script>

</body>
